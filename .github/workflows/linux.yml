name: Build Zapret (Linux)
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "Zapret"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies (Linux only)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade \
            pyinstaller \
            PyQt6 \
            PyQt6-Fluent-Widgets \
            PySocks \
            psutil \
            requests \
            urllib3 \
            tgcrypto \
            qtawesome \
            darkdetect \
            httpx \
            packaging

      - name: Generate build files
        run: |
          python - << 'PY'
          import os, pathlib
          cfg = pathlib.Path("src/config")
          cfg.mkdir(exist_ok=True)

          (cfg / "build_info.py").write_text(
              "CHANNEL='stable'\nAPP_VERSION='0.0.0.0'\n",
              encoding="utf-8-sig")

          (cfg / "_build_secrets.py").write_text(
              "TG_UPDATE_BOT_TOKEN=''\n"
              "GITHUB_UPDATE_TOKEN=''\n"
              "TG_LOG_BOT_TOKEN_PROD=''\n"
              "TG_LOG_BOT_TOKEN_DEV=''\n"
              "TG_LOG_CHAT_ID=0\n"
              "UPDATE_SERVERS=[]\n"
              "PREMIUM_API_BASE_URL=''\n",
              encoding="utf-8-sig")
          PY

      - name: Build Linux binary
        run: |
          cd src
          pyinstaller --noconfirm \
            --name ${{ env.APP_NAME }} \
            --onefile \
            --clean \
            --windowed \
            main.py
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zapret-Linux-x86_64-${{ github.sha }}
          path: src/dist/${{ env.APP_NAME }}
          retention-days: 30
